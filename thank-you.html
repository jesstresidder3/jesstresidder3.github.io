<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message sent | Jess Tresidder</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://jesstresidder.com/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
  <meta name="theme-color" content="#FF2E8E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--off-white:#FFF6F1;--cream:#FEFCFA;--peach:#E0916F;--peach-dark:#C87A5A;--peach-soft:#FCEEE7;--blue-dark:#4A8AB5;--text:#1A1A1A;--text-mid:#555555;--text-light:#767676;--border:#E8E3DD}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--off-white);color:var(--text);font-family:'Plus Jakarta Sans',-apple-system,sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased;padding:24px}
    .card{max-width:520px;text-align:center}
    .tick{width:64px;height:64px;border-radius:50%;background:var(--peach-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    .tick svg{width:30px;height:30px;stroke:var(--peach-dark);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.7rem,4vw,2.2rem);font-weight:700;letter-spacing:-0.03em;margin-bottom:12px}
    p{color:var(--text-mid);margin-bottom:28px;font-size:1.02rem}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.88rem;padding:13px 26px;border-radius:8px;text-decoration:none;transition:all .2s}
    .btn-primary{background:var(--peach);color:#fff}.btn-primary:hover{background:var(--peach-dark)}
    .btn-ghost{color:var(--text);border:1.5px solid rgba(28,43,58,.2)}.btn-ghost:hover{border-color:var(--peach);color:var(--peach-dark)}
  </style>
</head>
<body>
  <div class="card">
    <div class="tick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h1>Thanks, that's come through</h1>
    <p>Your message is on its way to my inbox. I read everything myself and I'll get back to you within a day.</p>
    <div class="btns">
      <a href="/" class="btn btn-primary">Back to home</a>
      <a href="https://linkedin.com/in/jesstresidder/" target="_blank" rel="noopener noreferrer" class="btn btn-ghost">Connect on LinkedIn</a>
    </div>
  </div>
</body>
</html>
